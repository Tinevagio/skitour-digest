name: Skitour Daily Digest

on:
  schedule:
    - cron: "31 14 * * *"   # 7h Paris (hiver UTC+1) — ajuste si besoin
  workflow_dispatch:       # Lancement manuel depuis l'onglet Actions

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Skitour Digest
        working-directory: src
        env:
          SKITOUR_API_KEY: ${{ secrets.SKITOUR_API_KEY }}
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          SMTP_HOST:       ${{ secrets.SMTP_HOST }}
          SMTP_PORT:       ${{ secrets.SMTP_PORT }}
          SMTP_USER:       ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:   ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL:      ${{ secrets.FROM_EMAIL }}
          TO_EMAILS:       ${{ secrets.TO_EMAILS }}
          MASSIF_IDS:      ${{ vars.MASSIF_IDS }}
        run: python main.py
